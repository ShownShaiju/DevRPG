<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluation Room | DevRPG</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #212529; } /* Dark theme background */
    </style>
</head>
<body>

<form style="display:none;">{% csrf_token %}</form>

<div class="container mt-5">
    <div class="card shadow-lg border-0 bg-dark text-light">
        <div class="card-header bg-primary text-white border-bottom-0">
            <h3 class="mb-0"><i class="fas fa-robot"></i> The Evaluation Chamber</h3>
        </div>
        <div class="card-body p-4">

            <div id="setup-screen">
                <h5 class="card-title">Select a Skill to Validate</h5>
                <select id="skill-select" class="form-select bg-dark text-light mb-3">
                    <option value="" disabled selected>Choose your skill...</option>
                    {% for us in user_skills %}
                        <option value="{{ us.skill.id }}">Level {{ us.level }} {{ us.skill.name }}</option>
                    {% endfor %}
                </select>
                
                <label class="form-label">Target Level (Challenge Difficulty)</label>
                <input type="number" id="target-level" class="form-control bg-dark text-light mb-4" value="1" min="1" max="5">
                
                <button id="start-btn" class="btn btn-success w-100 fw-bold">START CHALLENGE</button>
            </div>

            <div id="question-screen" style="display: none;">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span class="badge bg-danger fs-5" id="timer-display">Time: 00:00</span>
                    <span class="badge bg-info fs-6" id="level-display"></span>
                </div>
                
                <div class="alert alert-secondary bg-dark text-light border-secondary">
                    <h5 class="text-warning">Scenario:</h5>
                    <p id="scenario-text" style="white-space: pre-wrap;"></p>
                    <hr class="border-secondary">
                    <h5 class="text-warning">Task:</h5>
                    <p id="task-text" class="fw-bold"></p>
                </div>

                <textarea id="answer-input" class="form-control bg-dark text-light mb-3" rows="6" placeholder="Type your technical answer here..."></textarea>
                <button id="submit-btn" class="btn btn-primary w-100 fw-bold">SUBMIT TO AI</button>
            </div>

            <div id="loading-screen" style="display: none;" class="text-center py-5">
                <div class="spinner-border text-primary mb-3" role="status" style="width: 3rem; height: 3rem;"></div>
                <h4 class="text-light" id="loading-text">The AI is evaluating your code...</h4>
                <p class="text-muted small">Please do not refresh the page.</p>
            </div>

            <div id="result-screen" style="display: none;">
                <h2 class="text-center mb-4" id="final-verdict"></h2>
                
                <div class="alert alert-info bg-dark text-light border-info">
                    <h5>AI Reasoning:</h5>
                    <p id="reasoning-text"></p>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="card bg-dark border-success mb-3">
                            <div class="card-header border-success text-success fw-bold">Strengths</div>
                            <ul class="list-group list-group-flush" id="strengths-list"></ul>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card bg-dark border-danger mb-3">
                            <div class="card-header border-danger text-danger fw-bold">Knowledge Gaps</div>
                            <ul class="list-group list-group-flush" id="gaps-list"></ul>
                        </div>
                    </div>
                </div>
                
                <div class="text-center mt-4">
                    <h4 class="text-warning">Total XP: <span id="xp-display"></span></h4>
                    <button class="btn btn-outline-light mt-3" onclick="location.href='/dashboard/'">Return to Dashboard</button>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
    const csrftoken = getCookie('csrftoken');
</script>

<script>
    let currentSessionId = null;
    let currentQuestionId = null;
    let timerInterval = null;
    let pollInterval = null;

    // --- 1. START CHALLENGE ---
    document.getElementById('start-btn').addEventListener('click', async () => {
        const skillId = document.getElementById('skill-select').value;
        const targetLevel = document.getElementById('target-level').value;

        if (!skillId) { alert('Please select a skill!'); return; }

        try {
            const response = await fetch('/api/evaluation/start/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrftoken },
                body: JSON.stringify({ skill_id: skillId, target_level: targetLevel })
            });

            if (!response.ok) {
                // Safely handle server crash errors
                const text = await response.text();
                try {
                    const data = JSON.parse(text);
                    alert(data.error || 'Failed to start session.');
                } catch(e) {
                    console.error("Server Error:", text);
                    alert("Server crashed! Did you run `python manage.py makemigrations` and `migrate`?");
                }
                return;
            }

            const data = await response.json();
            currentSessionId = data.session_id;
            currentQuestionId = data.question.id;
            
            document.getElementById('scenario-text').textContent = data.question.scenario;
            document.getElementById('task-text').textContent = data.question.task;
            document.getElementById('level-display').textContent = `Level ${data.question.target_level} Challenge`;
            
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('question-screen').style.display = 'block';
            
            let timeLeft = 480; 
            timerInterval = setInterval(() => {
                timeLeft--;
                const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
                const s = (timeLeft % 60).toString().padStart(2, '0');
                document.getElementById('timer-display').textContent = `Time: ${m}:${s}`;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    alert("Time's up! Submitting whatever you have.");
                    document.getElementById('submit-btn').click();
                }
            }, 1000);

        } catch (error) {
            console.error("Fetch error:", error);
            alert("Network error occurred.");
        }
    });

    // --- 2. SUBMIT ANSWER ---
    document.getElementById('submit-btn').addEventListener('click', async () => {
        const answerText = document.getElementById('answer-input').value;
        if (!answerText.trim()) { alert('Please write an answer!'); return; }

        clearInterval(timerInterval);
        
        document.getElementById('question-screen').style.display = 'none';
        document.getElementById('loading-screen').style.display = 'block';

        const response = await fetch(`/api/evaluation/session/${currentSessionId}/submit/`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrftoken },
            body: JSON.stringify({ question_id: currentQuestionId, answer_text: answerText })
        });

        if (response.ok) {
            pollInterval = setInterval(checkStatus, 3000);
        } else {
            alert('Submission failed. Check console for details.');
            location.reload();
        }
    });

    // --- 3. POLL CELERY WORKER ---
    async function checkStatus() {
        const response = await fetch(`/api/evaluation/session/${currentSessionId}/status/`, {
            headers: { 'X-CSRFToken': csrftoken }
        });
        
        const data = await response.json();

        if (data.status === 'completed') {
            clearInterval(pollInterval);
            
            document.getElementById('final-verdict').textContent = `Level ${data.level_awarded} Awarded!`;
            document.getElementById('final-verdict').className = data.level_awarded > 0 ? "text-center mb-4 text-success" : "text-center mb-4 text-danger";
            document.getElementById('reasoning-text').textContent = data.reasoning;
            document.getElementById('xp-display').textContent = data.new_total_xp;

            const strengthsList = document.getElementById('strengths-list');
            strengthsList.innerHTML = '';
            data.strengths.forEach(s => { strengthsList.innerHTML += `<li class="list-group-item bg-dark text-success"><i class="fas fa-check"></i> ${s}</li>`; });

            const gapsList = document.getElementById('gaps-list');
            gapsList.innerHTML = '';
            data.gaps.forEach(g => { gapsList.innerHTML += `<li class="list-group-item bg-dark text-danger"><i class="fas fa-times"></i> ${g}</li>`; });

            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
        } else if (data.status !== 'evaluating') {
            clearInterval(pollInterval);
            alert('Evaluation failed or was abandoned.');
            location.reload();
        }
    }
</script>
</body>
</html>
